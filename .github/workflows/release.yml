name: Cross-Platform Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: |
          uv sync --all-extras --dev
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi

      - name: Get Version
        id: version
        shell: bash
        run: |
          PROJ_VERSION=$(uv version --short)
          echo "VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF##*/}
            echo "TAG_VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT
            echo "TAG_NAME=$BRANCH_NAME-v$PROJ_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: |
          echo "Version mismatch: project version ${{ steps.version.outputs.VERSION }} != tag version ${{ steps.version.outputs.TAG_VERSION }}"
          exit 1

      - name: Set Nuitka Mode
        id: nuitka-config
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "MODE=app" >> $GITHUB_OUTPUT
          else
            echo "MODE=standalone" >> $GITHUB_OUTPUT
          fi

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          mode: ${{ steps.nuitka-config.outputs.MODE }}
          script-name: main.py
          output-dir: build
          enable-plugins: pyside6
          include-package: |
            qfluentwidgets
            sqlalchemy
            aiosqlite
            croniter
            pyqtgraph
          include-package-data: |
            qfluentwidgets
            pyqtgraph
          include-module: |
            PySide6.QtAsyncio
          disable-console: true
          windows-icon-from-ico: app.ico
          macos-app-icon: icon.icns

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ZIP_NAME="locator-debugger-Linux-${{ steps.version.outputs.TAG_NAME }}.zip"
          cd build/main.dist
          zip -r "../../$ZIP_NAME" .
          cd ../..

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ZIP_NAME="locator-debugger-macOS-${{ steps.version.outputs.TAG_NAME }}.zip"
          cd build
          zip -r "../$ZIP_NAME" *.app
          cd ..

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zipName = "locator-debugger-Windows-${{ steps.version.outputs.TAG_NAME }}.zip"
          Compress-Archive -Path "build\main.dist\*" -DestinationPath $zipName

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: locator-debugger-*.zip
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (For manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}
          path: locator-debugger-*.zip
