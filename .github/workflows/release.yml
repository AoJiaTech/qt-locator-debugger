name: Cross-Platform Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: |
          uv sync --all-extras --dev
          uv pip install pyinstaller
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi

      - name: Get Version
        id: version
        shell: bash
        run: |
          PROJ_VERSION=$(uv version --short)
          echo "VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF##*/}
            echo "TAG_VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT
            echo "TAG_NAME=$BRANCH_NAME-v$PROJ_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: |
          echo "Version mismatch: project version ${{ steps.version.outputs.VERSION }} != tag version ${{ steps.version.outputs.TAG_VERSION }}"
          exit 1

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name locator-debugger \
            --icon app.ico \
            --collect-all qfluentwidgets \
            --collect-all pyqtgraph \
            --hidden-import PySide6.QtAsyncio \
            --hidden-import aiosqlite \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import logging.config \
            --hidden-import logging.handlers \
            --add-data "alembic.ini;." \
            --add-data "migrations;migrations" \
            main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name locator-debugger \
            --icon icon.icns \
            --collect-all qfluentwidgets \
            --collect-all pyqtgraph \
            --hidden-import PySide6.QtAsyncio \
            --hidden-import aiosqlite \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import logging.config \
            --hidden-import logging.handlers \
            --add-data "alembic.ini:." \
            --add-data "migrations:migrations" \
            main.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name locator-debugger \
            --collect-all qfluentwidgets \
            --collect-all pyqtgraph \
            --hidden-import PySide6.QtAsyncio \
            --hidden-import aiosqlite \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import logging.config \
            --hidden-import logging.handlers \
            --add-data "alembic.ini:." \
            --add-data "migrations:migrations" \
            main.py

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zipName = "locator-debugger-Windows-${{ steps.version.outputs.TAG_NAME }}.zip"
          Compress-Archive -Path "dist\locator-debugger\*" -DestinationPath $zipName

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ZIP_NAME="locator-debugger-macOS-${{ steps.version.outputs.TAG_NAME }}.zip"
          cd dist
          zip -r "../$ZIP_NAME" locator-debugger.app
          cd ..

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ZIP_NAME="locator-debugger-Linux-${{ steps.version.outputs.TAG_NAME }}.zip"
          cd dist/locator-debugger
          zip -r "../../$ZIP_NAME" .
          cd ../..

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: locator-debugger-*.zip
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (For manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}
          path: locator-debugger-*.zip
