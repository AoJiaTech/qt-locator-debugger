name: Cross-Platform Build and Release

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
  
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10' 
  
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Get Version
        id: version
        run: |
          uv sync --all-extras --dev
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Get Version
        id: version
        shell: bash
        run: |
          PROJ_VERSION=$(uv version --short)
          echo "VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF##*/}
            echo "TAG_VERSION=$PROJ_VERSION" >> $GITHUB_OUTPUT
            echo "TAG_NAME=$BRANCH_NAME-v$PROJ_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: |
          echo "Version mismatch: project version ${{ steps.version.outputs.VERSION }} != tag version ${{ steps.version.outputs.TAG_VERSION }}"
          exit 1
          
      - name: Set Nuitka Mode
        id: nuitka-config
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "MODE=app" >> $GITHUB_OUTPUT
          else
            echo "MODE=onefile" >> $GITHUB_OUTPUT
          fi

      - name: Qt GUI with PySide6
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          mode: ${{ steps.nuitka-config.outputs.MODE }}
          script-name: main.py
          enable-plugins: pyside6
          include-package-data: qfluentwidgets
          
      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ZIP_NAME="locator-debugger-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}.zip"
          cd build
          if [ "$RUNNER_OS" == "macOS" ]; then
            zip -r "../$ZIP_NAME" *.app
          else
            # Linux 打包单文件二进制，用 -j
            zip -j "../$ZIP_NAME" *.bin
          fi
          cd ..

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv build/*.exe "locator-debugger-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}.exe"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') 
        uses: softprops/action-gh-release@v2
        with:
          files: |
            locator-debugger-*.exe
            locator-debugger-*.zip
          append_body: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (For manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}
          path: |
            locator-debugger-*.exe
            locator-debugger-*.zip
