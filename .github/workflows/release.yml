name: Cross-Platform Build and Release

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
  
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
  
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Get Version
        id: version
        shell: bash
        run: |
          echo "VERSION=$(uv version --short)" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: |
          echo "Version mismatch: project version ${{ steps.version.outputs.VERSION }} != tag version ${{ steps.version.outputs.TAG_VERSION }}"
          exit 1

      - name: Qt GUI with PySide6
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          enable-plugins: pyside6
          onefile: true
          
      - name: Rename and zip artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ZIP_NAME="locator-debugger-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}.zip"
          zip -j "$ZIP_NAME" build/*.bin build/*.app/**/* || zip -j "$ZIP_NAME" build/*

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path build\*.exe -Destination "locator-debugger-${{ runner.os }}-${{ steps.version.outputs.TAG_NAME }}.exe"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            locator-debugger-*.exe
            locator-debugger-*.zip
          append_body: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
